<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متابعة السوق السعودي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .card-tasi { border-top: 5px solid #1a4d2e; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">لوحة بيانات الأسهم السعودية</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="input-group mb-4">
                    <input type="text" name="symbol" class="form-control" placeholder="أدخل رمز السهم (مثلاً: 1120)">
                    <button class="btn btn-success" type="submit">عرض البيانات</button>
                </form>

                {% if data %}
                <div class="card card-tasi shadow-sm text-center">
                    <div class="card-body">
                        <h5 class="card-title text-muted">سهم {{ data.symbol }}</h5>
                        <h1 class="display-4">{{ data.price }} <small style="font-size: 20px;">ريال</small></h1>
                        <hr>
                        <div class="row">
                            <div class="col text-success">الأعلى: {{ data.high }}</div>
                            <div class="col text-danger">الأدنى: {{ data.low }}</div>
                        </div>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
