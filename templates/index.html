<!DOCTYPE html>
<html>
<head>
    <title>ماسح WaveTrend السعودي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5 text-end" dir="rtl">
    <h2 class="mb-4">تقاطعات WaveTrend - السوق السعودي</h2>
    
    <div class="row">
        <div class="col-md-6">
            <h3 class="text-success">تقاطعات إيجابية (شراء)</h3>
            <ul class="list-group">
                {% for stock in pos %}
                <li class="list-group-item">{{ stock }}</li>
                {% endfor %}
            </ul>
        </div>
        
        <div class="col-md-6">
            <h3 class="text-danger">تقاطعات سلبية (بيع)</h3>
            <ul class="list-group">
                {% for stock in neg %}
                <li class="list-group-item">{{ stock }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
