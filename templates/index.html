<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro TASI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ticker-bar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px; overflow-x: auto; white-space: nowrap; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .btn-pro { background-color: #238636; color: white; border: none; }
        .fib-table { font-size: 0.9rem; }
        .badge-flow { font-size: 1rem; padding: 10px; }
    </style>
</head>
<body>

<div class="ticker-bar d-flex justify-content-around">
    {% for name, val in globals.items() %}
    <div><span class="text-muted">{{ name }}:</span> <span class="fw-bold text-white">{{ val }}</span></div>
    {% endfor %}
</div>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="stat-card">
                <h5>بحث وتحليل</h5>
                <form method="POST">
                    <input type="text" name="symbol" class="form-control bg-dark text-white border-secondary mb-2" placeholder="رمز السهم (مثلاً: 1120)">
                    <button class="btn btn-pro w-100">تحديث البيانات</button>
                </form>
            </div>

            <div class="stat-card">
                <h5>استراتيجية السيولة</h5>
                <span class="badge {% if flow == 'إيجابية' %}bg-success{% else %}bg-danger{% endif %} w-100 badge-flow">
                    السيولة الحالية: {{ flow }}
                </span>
            </div>

            <div class="stat-card">
                <h5>مستويات Fibonacci</h5>
                <table class="table table-dark table-sm fib-table">
                    {% for level, val in fib.items() %}
                    <tr><td>{{ level }}</td><td class="text-info">{{ val }}</td></tr>
                    {% endfor %}
                </table>
            </div>
        </div>

        <div class="col-md-9">
            <div class="stat-card">
                <div class="d-flex justify-content-between mb-3">
                    <h4>تحليل سهم {{ symbol }}</h4>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm">4H</button>
                        <button class="btn btn-outline-secondary btn-sm active">D</button>
                        <button class="btn btn-outline-secondary btn-sm">W</button>
                        <button class="btn btn-outline-secondary btn-sm">M</button>
                    </div>
                </div>
                <div id="chart" style="height: 600px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    var graph = {{ graph_json | safe }};
    Plotly.newPlot('chart', graph.data, graph.layout);
</script>
</body>
</html>
