<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيليكس - مؤشرات تاسي</title>
    <style>
        :root {
            /* هوية ألوان تصميم فيليكس */
            --felix-bg: #0f172a;
            --felix-card: #1e293b;
            --felix-accent: #38bdf8;
            --felix-text: #f8fafc;
            --felix-success: #22c55e;
            --felix-secondary: #94a3b8;
        }

        body {
            background-color: var(--felix-bg);
            color: var(--felix-text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
        }

        .felix-card {
            background: var(--felix-card);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .felix-card:hover {
            transform: translateY(-5px);
            border-color: var(--felix-accent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--felix-accent);
            letter-spacing: 1px;
        }

        .market-label {
            background: rgba(56, 189, 248, 0.1);
            color: var(--felix-accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .stock-name {
            font-size: 1.5rem;
            margin: 10px 0;
            color: var(--felix-secondary);
        }

        .price-main {
            font-size: 4rem;
            font-weight: 900;
            margin: 0.5rem 0;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .change-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--felix-success);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--felix-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="felix-card">
            <div class="header">
                <div class="logo">FELIX DESIGN</div>
                <div class="market-label">السوق السعودي</div>
            </div>
            
            <div class="stock-name">سهم {{ data.name }}</div>
            <div class="price-main">{{ data.price }}</div>
            
            <div class="change-badge">
                ↑ {{ data.change }}%
            </div>

            <div class="footer-note">
                تم التحديث بواسطة نظام فيليكس • TASI
            </div>
        </div>
    </div>
</body>
</html>
